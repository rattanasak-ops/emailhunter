version: "3.8"

services:
  searxng:
    image: searxng/searxng:latest
    container_name: emailhunter-searxng
    ports:
      - "8888:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
      - ./searxng/limiter.toml:/etc/searxng/limiter.toml:ro
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET}
    mem_limit: 512m
    cpus: 0.5
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - emailhunter-network
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: emailhunter-redis
    mem_limit: 128m
    cpus: 0.2
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - emailhunter-network

  api:
    build: ./api
    container_name: emailhunter-api
    environment:
      - LINE_NOTIFY_TOKEN=${LINE_NOTIFY_TOKEN}
      - LARK_APP_ID=${LARK_APP_ID}
      - LARK_APP_SECRET=${LARK_APP_SECRET}
      - LARK_CHAT_ID=${LARK_CHAT_ID}
      - TZ=Asia/Bangkok
    volumes:
      - api-data:/data
      - ./backups:/data/backups
    mem_limit: 1g
    cpus: 1.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3456/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - emailhunter-network

  n8n:
    image: n8nio/n8n:latest
    container_name: emailhunter-n8n
    ports:
      - "5680:5678"
    environment:
      - N8N_HOST=${N8N_HOST}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - GENERIC_TIMEZONE=Asia/Bangkok
      - TZ=Asia/Bangkok
    volumes:
      - n8n-data:/home/node/.n8n
    mem_limit: 2g
    cpus: 1.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5678/healthz"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - emailhunter-network
    depends_on:
      - searxng
      - api

  dashboard:
    image: nginx:alpine
    container_name: emailhunter-dashboard
    ports:
      - "8890:80"
    volumes:
      - ./dashboard/index.html:/usr/share/nginx/html/index.html:ro
      - ./dashboard/favicon.svg:/usr/share/nginx/html/favicon.svg:ro
      - ./dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    mem_limit: 128m
    cpus: 0.2
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - emailhunter-network
    depends_on:
      - api

volumes:
  n8n-data:
    driver: local
  api-data:
    driver: local

networks:
  emailhunter-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
